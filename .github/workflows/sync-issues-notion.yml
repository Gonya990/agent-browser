name: Sync Issue to Notion

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create Notion page
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ISSUES_DB_ID: ${{ secrets.NOTION_ISSUES_DB_ID }}
        run: |
          python3 <<'PYEOF'
          import json
          import os
          import urllib.request

          with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as event_file:
              event = json.load(event_file)

          issue = event["issue"]
          repository = event["repository"]
          labels = [label["name"] for label in issue.get("labels", [])]
          normalized_labels = [label.lower() for label in labels]

          issue_type = "other"
          if any("bug" in label for label in normalized_labels):
              issue_type = "bug"
          elif any("feature" in label for label in normalized_labels):
              issue_type = "feature"
          elif any("enhancement" in label for label in normalized_labels):
              issue_type = "enhancement"
          elif any("question" in label for label in normalized_labels):
              issue_type = "question"

          priority = "Medium"
          if any(
              marker in label
              for label in normalized_labels
              for marker in ("high", "critical", "urgent")
          ):
              priority = "High"
          elif any(
              marker in label
              for label in normalized_labels
              for marker in ("low", "wontfix")
          ):
              priority = "Low"

          number = issue["number"]
          title = issue.get("title", "")
          url = issue["html_url"]
          author = issue["user"]["login"]
          opened_at = issue["created_at"][:10]
          body = (issue.get("body") or "")[:1800]

          payload = {
              "parent": {"database_id": os.environ["NOTION_ISSUES_DB_ID"]},
              "properties": {
                  "Title": {
                      "title": [
                          {"text": {"content": f"[#{number}] {title}"[:2000]}}
                      ]
                  },
                  "Repo": {"select": {"name": repository["name"]}},
                  "Status": {"select": {"name": "Open"}},
                  "Type": {"select": {"name": issue_type}},
                  "Priority": {"select": {"name": priority}},
                  "GitHub URL": {"url": url},
                  "Issue Number": {
                      "rich_text": [{"text": {"content": f"#{number}"}}]
                  },
                  "Author": {
                      "rich_text": [{"text": {"content": author[:2000]}}]
                  },
                  "Labels": {
                      "rich_text": [
                          {"text": {"content": ", ".join(labels)[:2000]}}
                      ]
                  },
                  "Opened At": {"date": {"start": opened_at}},
              },
              "children": [
                  {
                      "object": "block",
                      "type": "heading_2",
                      "heading_2": {
                          "rich_text": [
                              {"type": "text", "text": {"content": "Description"}}
                          ]
                      },
                  },
                  {
                      "object": "block",
                      "type": "paragraph",
                      "paragraph": {
                          "rich_text": [
                              {
                                  "type": "text",
                                  "text": {"content": body or "(no description)"},
                              }
                          ]
                      },
                  },
                  {"object": "block", "type": "divider", "divider": {}},
                  {
                      "object": "block",
                      "type": "bookmark",
                      "bookmark": {"url": url},
                  },
              ],
          }

          request = urllib.request.Request(
              "https://api.notion.com/v1/pages",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {os.environ['NOTION_TOKEN']}",
                  "Content-Type": "application/json",
                  "Notion-Version": "2022-06-28",
              },
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              result = json.loads(response.read())
              print(f"Notion page created: {result.get('url', '')}")
          PYEOF
